# Token manifest for `minter creds`. Public data only, safe to commit.
#
# Copy to minter.yaml (or pass -f FILE) and replace the keys with your own:
#
#   minter keygen operator   # public key goes in `operator` below
#   minter keygen account    # public key goes in an account entry
#   minter keygen user       # public key goes in a user entry
#
# Seeds are never stored. `minter creds` resolves every signing seed from a
# VALISS_SEED_<PUBKEY> environment variable and fails when one is missing:
#
#   export VALISS_SEED_ODPRLS...=SOAIRX...   # operator seed, signs account tokens
#   export VALISS_SEED_AC4BYR...=SAAKP6...   # account seed, signs its users' tokens
#   minter creds acme          > acme.creds        # account-level creds
#   minter creds acme/alice    > alice.creds       # user-level creds
#   minter creds -bundle acme/alice > alice.creds  # bundle: + account token
#
# The creds go to stdout; metadata goes to stderr as YAML, including the
# account token jti the server-side allowlist must accept.
#
# Entries without a `key` get a fresh key pair generated per invocation; the
# seed ships only inside the creds. Entries with a `key` require the
# matching VALISS_SEED_<key> at mint time.
#
# The keys below are throwaway examples; minting against them fails unless
# you hold the matching seeds.

# The operator public key is the trust anchor servers pin; one trust domain
# per manifest.
operator: ODPRLS7YYJKZTLCJFUO765BRAHYY5MTKNMAZIOFEL6WCDAVKQOBD25ZJ
accounts:
  # One entry per tenant. The account key signs the tenant's requests and
  # its users' tokens.
  - name: acme              # tenant name; segments all stored data
    key: AC4BYRVFUKRB7R4QEHSQFGV7R6HDIAMGR2C6GPAOUD3BANKQ4G44JQU4
    # Validity boundaries are absolute RFC3339 timestamps, so re-minting is
    # deterministic. Omitted expires = the token never expires;
    # omitted not_before = valid immediately. Authorization lives in typed
    # extension claims, which are a programmatic-issuance feature; this tool
    # mints plain identity tokens.
    expires: 2026-08-08T00:00:00Z
    users:
      - name: alice
        key: UDT3JMUJSPJR6KQOQ33JMFK44T4TTQWF4X35RFHI62WAWWQOXYSKEDH7
        expires: 2026-07-16T00:00:00Z
        not_before: 2026-07-09T00:00:00Z
      # No key: a fresh pair is generated on every `minter creds acme/bob`,
      # and the seed ships inside the creds.
      - name: bob
      # Bearer: token-only credential that cannot sign requests; no seed is
      # handed out (a keyless entry gets a throwaway pair at mint time).
      # Replayable until expiry; keep the window short.
      - name: carol
        bearer: true
        expires: 2026-07-10T00:00:00Z

  # No account key: a fresh pair is generated per mint. Such an account
  # cannot have users minted from this manifest (its signing seed has no
  # stable VALISS_SEED_ name).
  - name: globex
